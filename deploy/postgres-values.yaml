# Bitnami PostgreSQL Helm chart value overrides for local development.
# Credentials here are for local Kind use only -- never use these in production.
auth:
  postgresPassword: "taskmanager"
  database: "taskmanager"

primary:
  persistence:
    size: "5Gi"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  # Tuned for throughput within local resource constraints.
  extendedConfiguration: |
    max_connections = 300
    shared_buffers = 512MB
    effective_cache_size = 1536MB
    work_mem = 8MB
    maintenance_work_mem = 128MB
    wal_buffers = 16MB
    max_wal_size = 1GB
    checkpoint_completion_target = 0.9
    random_page_cost = 1.1
    effective_io_concurrency = 200
    synchronous_commit = off
    commit_delay = 100
    commit_siblings = 5
