# Kind cluster configuration for local development.
# Maps host port 8080 to container port 30080 so the NodePort service
# is reachable at localhost:8080.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
