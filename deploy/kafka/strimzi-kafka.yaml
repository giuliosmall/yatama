# Strimzi Kafka cluster for task-manager.
# Requires the Strimzi operator to be installed first:
#   kubectl create -f https://strimzi.io/install/latest?namespace=default
#
# Local (kind): runs with reduced resources.
# Cloud: increase replicas, CPU, memory, and storage.
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: task-manager-kafka
  labels:
    app: task-manager
    component: kafka
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      num.partitions: 128
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      log.retention.ms: 604800000
      unclean.leader.election.enable: false
      # Throughput tuning.
      num.network.threads: 4
      num.io.threads: 8
      socket.send.buffer.bytes: 1048576
      socket.receive.buffer.bytes: 1048576
      log.flush.interval.messages: 50000
      log.flush.interval.ms: 1000
      num.replica.fetchers: 2
    storage:
      type: persistent-claim
      size: 10Gi
      deleteClaim: false
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"
  entityOperator:
    topicOperator: {}
    userOperator: {}
