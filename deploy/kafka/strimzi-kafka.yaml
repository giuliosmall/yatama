# Strimzi Kafka cluster using KRaft mode (no ZooKeeper).
# Requires Strimzi operator >= 0.46.0.
#
# This uses KafkaNodePool resources for broker configuration as required
# by modern Strimzi versions.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: combined
  labels:
    strimzi.io/cluster: task-manager-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 10Gi
    deleteClaim: false
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: task-manager-kafka
  labels:
    app: task-manager
    component: kafka
  annotations:
    strimzi.io/kraft: "enabled"
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: 4.2.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      num.partitions: 128
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      log.retention.ms: 604800000
      # Throughput tuning.
      num.network.threads: 4
      num.io.threads: 8
      socket.send.buffer.bytes: 1048576
      socket.receive.buffer.bytes: 1048576
      log.flush.interval.messages: 50000
      log.flush.interval.ms: 1000
      num.replica.fetchers: 2
  entityOperator:
    topicOperator: {}
    userOperator: {}
