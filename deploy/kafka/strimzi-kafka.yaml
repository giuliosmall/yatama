# Strimzi Kafka cluster for task-manager scaled deployment.
# Requires the Strimzi operator to be installed first:
#   kubectl create -f https://strimzi.io/install/latest?namespace=default
#
# This creates a 3-broker Kafka cluster with 3 ZooKeeper nodes, internal
# plaintext listeners, and persistent storage suitable for high-throughput
# task ingestion.
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: task-manager-kafka
  labels:
    app: task-manager
    component: kafka
spec:
  kafka:
    version: 3.7.0
    replicas: 3
    listeners:
      # Internal plaintext listener -- all producers and consumers are
      # cluster-local so TLS is not required for this dev/staging setup.
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # High partition count so topics can be consumed in parallel by many
      # worker pods.
      num.partitions: 64
      # Replication settings for durability.
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      # 7-day log retention (in milliseconds).
      log.retention.ms: 604800000
      # Allow unclean leader election only for development speed -- disable
      # this in production for stronger durability guarantees.
      unclean.leader.election.enable: false
    storage:
      type: persistent-claim
      size: 50Gi
      deleteClaim: false
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 10Gi
      deleteClaim: false
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  entityOperator:
    topicOperator: {}
    userOperator: {}
