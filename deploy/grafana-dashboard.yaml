# Dashboard provider -- tells Grafana to load JSON files from a directory.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  default.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
# Pre-built Task Manager dashboard with panels for all 7 app metrics.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
data:
  task-manager.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(http_requests_total[1m])",
              "legendFormat": "{{method}} {{path}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "HTTP Latency p95",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Tasks Created",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(tasks_created_total[1m])",
              "legendFormat": "{{type}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Worker Tasks Processed",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(worker_tasks_processed_total[1m])",
              "legendFormat": "{{type}} {{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Tasks In Progress",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 3 },
                  { "color": "red", "value": 6 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "worker_tasks_in_progress",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Task Duration p95",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "lineWidth": 1, "fillOpacity": 10 }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(worker_task_duration_seconds_bucket[5m]))",
              "legendFormat": "{{type}}",
              "refId": "A"
            }
          ]
        },
        {
          "title": "DLQ Tasks",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "sum(worker_dlq_tasks_depth) or vector(0)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "1s",
      "schemaVersion": 39,
      "tags": ["task-manager"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "title": "Task Manager",
      "uid": "task-manager"
    }
